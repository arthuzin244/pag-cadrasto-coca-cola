<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Coca-Cola Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
        }

        body {
            background: #111111; /* Fundo escuro para destacar o vermelho */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Detalhe de onda no fundo simulando o visual da marca */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #f40009 0%, #111111 70%);
            opacity: 0.3;
            z-index: 1;
        }

        .login-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(244, 0, 9, 0.2);
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 2;
            border-top: 8px solid #f40009; /* Linha vermelha icônica */
        }

        .brand-title {
            text-align: center;
            font-size: 32px;
            color: #f40009;
            margin-bottom: 8px;
            font-style: italic;
            letter-spacing: -1px;
        }

        .login-container h3 {
            text-align: center;
            margin-bottom: 24px;
            color: #333333;
            font-family: 'Segoe UI', sans-serif;
            font-size: 16px;
            font-weight: 400;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #444444;
            font-size: 14px;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            font-family: 'Segoe UI', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #f40009; /* Foco vermelho */
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #f40009; /* Vermelho Coca-Cola */
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-login:hover {
            background-color: #cc0008;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .utilities {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-family: 'Segoe UI', sans-serif;
        }

        .utilities a {
            color: #f40009;
            text-decoration: none;
            font-weight: 600;
        }

        .utilities a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-title">Coca-Cola</div>
        <h3>Faça login na sua conta</h3>
        
        <form action="#" method="POST">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="nome@exemplo.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="utilities">
            <a href="#">Esqueceu a senha?</a>
            <a href="#">Criar conta</a>
        </div>
    </div>

</body>
</html>
